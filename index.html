<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Clone</title>
  <link rel="stylesheet" href="css/style.css">
  <script defer src="js/script.js"></script>
  <script defer src="js/darkMode.js"></script>
</head>
<body>
  <header>
    <nav>
      <img src="assets/logo.png" alt="TikTok Clone Logo" class="logo">
      <button id="toggleMode">Toggle Mode</button>
    </nav>
  </header>

  <main>
    <div class="search-container">
      <input type="text" id="search" placeholder="Search TikTok videos...">
      <button onclick="searchTikTok()">Search</button>
    </div>

    <div id="result" class="result">
      <!-- TikTok videos will appear here -->
    </div>
  </main>

  <footer>
    <p>&copy; 2025 TikTok Clone - Made by Denish</p>
  </footer>
</body>
</html>
